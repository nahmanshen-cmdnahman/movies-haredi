<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת סרטים מאובטחת</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #e0e6ed 0%, #e8f0fe 100%); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }
        
        .card { 
            background: white; 
            padding: 35px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 550px; 
            text-align: center; 
            margin-top: 60px;
            position: relative;
        }

        h2 { color: #2c3e50; margin-bottom: 20px; }
        h3 { color: #34495e; text-align: right; margin-top: 25px; }

        input[type="text"], input[type="password"] { 
            padding: 12px; 
            width: 100%; 
            margin-bottom: 15px; 
            border: 2px solid #dae1e7; 
            border-radius: 6px; 
            text-align: center; 
            font-size: 16px; 
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #3498db;
            outline: none;
        }

        /* סגנון לתיבת החיפוש */
        .search-box {
            background-color: #f8fafc;
            border-color: #3498db;
            text-align: right !important;
            padding-right: 15px;
        }

        button { 
            padding: 12px 24px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #2980b9; }
        
        button.admin-btn { background-color: #2ecc71; }
        button.admin-btn:hover { background-color: #27ae60; }

        .hidden { display: none !important; }

        /* רשימת סרטים משודרגת */
        .movies-container { margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .movie-item { 
            padding: 15px; 
            border-bottom: 1px solid #edf2f7; 
            text-align: right; 
            font-size: 18px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .movie-item:last-child { border-bottom: none; }
        .movie-item a { 
            color: #3498db; 
            text-decoration: none; 
            font-weight: bold; 
            background: #e8f4fd;
            padding: 6px 12px;
            border-radius: 4px;
        }
        .movie-item a:hover { background: #3498db; color: white; }

        ul { text-align: right; background: #f8fafc; padding: 15px 35px; border-radius: 6px; border: 1px solid #e2e8f0; }
        li { padding: 5px 0; color: #4a5568; }

        /* כפתור התנתקות מוצמד למעלה משמאל */
        .logout-top { 
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #e74c3c; 
            color: white; 
            text-decoration: none; 
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
            transition: background-color 0.2s;
            z-index: 1000;
        }
        .logout-top:hover { background-color: #c0392b; }

        /* כפתור צף קבוע בתחתית המסך */
        .bottom-sticky-button {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #1abc9c, #16a085);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: background 0.2s;
        }
        .bottom-sticky-button:hover {
            background: linear-gradient(90deg, #16a085, #117a65);
        }
    </style>
</head>
<body>

    <a href="#" id="global-logout" class="logout-top hidden" onclick="logout()">התנתקות מהמערכת</a>

    <div id="login-screen" class="card">
        <h2>כניסה למערכת הסרטים</h2>
        <input type="password" id="password-input" placeholder="הכנס סיסמה קבועה או סיסמת צופה"><br>
        <button onclick="handleLogin()">התחבר</button>
    </div>

    <div id="admin-screen" class="card hidden">
        <h2>שלום מנהל המערכת</h2>
        <h3>הוספת סיסמת צופה חדשה:</h3>
        <input type="text" id="new-password-input" placeholder="הקלד סיסמה חדשה למשתמש"><br>
        <button class="admin-btn" onclick="addViewerPassword()">הוסף סיסמה למערכת</button>
        
        <h3>סיסמאות צופים פעילות:</h3>
        <ul id="passwords-list"></ul>
    </div>

    <div id="viewer-screen" class="card hidden">
        <h2>סרטים זמינים לצפייה</h2>
        
        <input type="text" id="search-input" class="search-box" placeholder="🔍 חפש סרט ברשימה..." oninput="filterMovies()">
        
        <div class="movies-container" id="movies-list"></div>
    </div>

    <a href="https://nahman-shenfeld-469405.my.canva.site/movies-haredi-platform/" target="_blank" id="sticky-canva-btn" class="bottom-sticky-button hidden">
        לצפייה לפי נושאים לחץ כאן 🎬
    </a>

    <script>
        // כתובת השרת המעודכנת שלך ב-Render
        const SERVER_URL = "https://movies-haredi-backend.onrender.com";
        
        let currentPassword = "";
        let allMovies = []; // שמירת הסרטים בצד הלקוח לצורך סינון בחיפוש

        async function handleLogin() {
            const password = document.getElementById('password-input').value;
            if (!password) return alert('נא להזין סיסמה');

            try {
                const response = await fetch(`${SERVER_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    return alert(errData.error || 'שגיאה בהתחברות');
                }

                const data = await response.json();
                currentPassword = password;

                // הצגת אלמנטים גלובליים לאחר התחברות מושכלת
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('global-logout').classList.remove('hidden');
                document.getElementById('sticky-canva-btn').classList.remove('hidden');

                if (data.role === 'admin') {
                    showAdminScreen(data.viewerPasswords);
                } else if (data.role === 'viewer') {
                    allMovies = data.movies || [];
                    showViewerScreen(allMovies);
                }
            } catch (error) {
                alert('שגיאה בתקשורת עם השרת. ודא שהשרת ברנדר פועל כראוי.');
            }
        }

        function showAdminScreen(passwords) {
            document.getElementById('admin-screen').classList.remove('hidden');
            const list = document.getElementById('passwords-list');
            list.innerHTML = passwords.map(p => `<li>${p}</li>`).join('') || '<li>אין עדיין סיסמאות במערכת</li>';
        }

        async function addViewerPassword() {
            const newViewerPassword = document.getElementById('new-password-input').value;
            if (!newViewerPassword) return alert('נא להזין סיסמה חדשה');

            try {
                const response = await fetch(`${SERVER_URL}/api/add-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminPassword: currentPassword, newViewerPassword })
                });

                if (response.ok) {
                    const data = await response.json();
                    showAdminScreen(data.viewerPasswords);
                    document.getElementById('new-password-input').value = "";
                    alert('הסיסמה נוספה בהצלחה!');
                }
            } catch (error) {
                alert('שגיאה בהוספת הסיסמה');
            }
        }

        function showViewerScreen(movies) {
            document.getElementById('viewer-screen').classList.remove('hidden');
            const container = document.getElementById('movies-list');
            
            container.innerHTML = movies.map(m => `
                <div class="movie-item">
                    <span>${m.title}</span>
                    <a href="${m.url}" target="_blank" rel="noopener noreferrer">צפייה 🎬</a>
                </div>
            `).join('') || '<p>אין סרטים העונים לחיפוש הנוכחי</p>';
        }

        // פונקציית החיפוש בזמן אמת
        function filterMovies() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = allMovies.filter(m => m.title.toLowerCase().includes(query));
            showViewerScreen(filtered);
        }

        function logout() {
            currentPassword = "";
            allMovies = [];
            document.getElementById('password-input').value = "";
            document.getElementById('search-input').value = "";
            
            // הסתרת מסכים ואלמנטים קבועים
            document.getElementById('admin-screen').classList.add('hidden');
            document.getElementById('viewer-screen').classList.add('hidden');
            document.getElementById('global-logout').classList.add('hidden');
            document.getElementById('sticky-canva-btn').classList.add('hidden');
            
            // חזרה למסך הלוגין
            document.getElementById('login-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
